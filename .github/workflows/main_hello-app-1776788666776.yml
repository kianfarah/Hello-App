# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - Hello-App-1776788666776

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Build with Maven
        run: mvn clean install
        env:
          DB_URL: ${{secrets.DB_URL}}
          DB_PASSWORD: ${{secrets.DB_PASSWORD}}
          DB_USER: ${{secrets.DB_USER}}

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/target/*.jar'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4CC8FC2C831F4BB0A1E667BF2A59B148 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7E5D28A36B174828B44E5B3A44B3B2B0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_22EF4A7D7C9C43E5880A2D62FB0D0684 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Hello-App-1776788666776'
          slot-name: 'Production'
          package: '*.jar'

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for App to wake up
        run: sleep 30
      - name: Check Health Endpoint
        run: |
          # The closing parenthesis ) after the URL is mandatory!
          status_code=$(curl -s -o /dev/null -w "%{http_code}" "https://hello-app-1776788666776.azurewebsites.net/actuator/health")
          
          if [ "$status_code" -ne 200 ]; then
            echo "Health check failed with status $status_code"
            exit 1
          else
            echo "App is healthy! Status: $status_code"
          fi